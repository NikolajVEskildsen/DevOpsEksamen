name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  frontend:
    name: Frontend — Lint & Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Vulnerability audit
        run: npm audit --audit-level=high

  backend:
    name: Backend — Lint, Test & Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Restore
        run: dotnet restore backend/TodoApp.sln

      - name: Format check
        run: dotnet format backend/TodoApp.sln --verify-no-changes

      - name: Build
        run: dotnet build backend/TodoApp.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/TodoApp.sln --no-build -c Release

      - name: Vulnerability audit
        run: dotnet list backend/TodoApp.sln package --vulnerable --include-transitive

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devops-eksamen .
